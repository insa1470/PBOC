<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查询系统</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
<div id="app">

  <!-- ── 首页：选择角色 ── -->
  <div class="screen" id="screen-landing">
    <div class="landing-wrap">
      <div class="landing-header">
        <div class="landing-title-row">
          <div class="landing-logo">
            <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="12" fill="#007AFF"/>
              <path d="M12 20h16M20 12v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="6" stroke="white" stroke-width="2"/>
            </svg>
          </div>
          <h1>查询系统</h1>
          <div class="landing-admin-btn" onclick="goTo('admin-login')" title="管理员登录">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>
        <p>请选择您的身份</p>
      </div>

      <div class="role-cards">
        <div class="role-card requester-card" onclick="initRequester()">
          <div class="card-bg-shape"></div>
          <div class="card-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </div>
          <div class="card-text">
            <h3>我是申请人</h3>
            <p>提交查询需求</p>
          </div>
          <div class="card-arrow">›</div>
        </div>

        <div class="role-card operator-card" onclick="initOperator()">
          <div class="card-bg-shape"></div>
          <div class="card-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </div>
          <div class="card-text">
            <h3>我是查询员</h3>
            <p>处理待办查询</p>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 申请人 ── -->
  <div class="screen hidden" id="screen-requester">
    <div class="page-header">
      <button class="btn-back" onclick="goTo('landing')">返回</button>
      <h2>提交查询申请</h2>
    </div>
    <div class="form-wrap">
      <div class="form-section">
        <div class="form-group">
          <label>申请人姓名</label>
          <input id="req-name" type="text" placeholder="请输入您的姓名">
        </div>
        <div class="form-group">
          <label>指定查询员</label>
          <select id="req-operator">
            <option value="">-- 选择查询员 --</option>
          </select>
        </div>
      </div>

      <div class="form-section">
        <h3>添加查询公司</h3>
        <div class="search-row">
          <div class="search-input-wrap">
            <input id="company-search" type="text" placeholder="输入公司名称搜索..." oninput="onCompanyInput(event)" autocomplete="off">
            <div id="company-dropdown" class="dropdown hidden"></div>
          </div>
          <select id="item-purpose">
            <option value="">-- 查询目的 --</option>
            <option value="贷前">贷前</option>
            <option value="贷中">贷中</option>
            <option value="贷后">贷后</option>
            <option value="担保">担保</option>
          </select>
          <button class="btn btn-primary" onclick="addItem()">添加</button>
        </div>
        <div id="auth-date-notice" class="auth-date-notice hidden">
          台账授权起始日：<strong id="selected-auth-date"></strong>
        </div>
      </div>

      <div class="form-section">
        <h3>本次申请清单</h3>
        <div id="batch-list">
          <p class="empty-hint">尚未添加任何公司</p>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary btn-large" onclick="submitBatch()">提交申请</button>
      </div>
    </div>
  </div>

  <!-- ── 查询员 ── -->
  <div class="screen hidden" id="screen-operator">
    <div class="page-header">
      <button class="btn-back" onclick="goTo('landing')">返回</button>
      <h2>查询作业</h2>
    </div>
    <div id="op-name-section" class="form-wrap">
      <div class="form-section">
        <div class="form-group">
          <label>请选择您的姓名</label>
          <select id="op-name-select">
            <option value="">載入中...</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadPendingItems()">查看待办</button>
      </div>
    </div>
    <div id="op-items-section" class="hidden">
      <div class="op-subheader">
        <span><strong id="op-current-name"></strong> 的待办查询
          <span id="pending-count" class="count-badge">0</span>
        </span>
        <button class="btn btn-ghost btn-sm" onclick="switchOperator()">切换</button>
      </div>
      <div id="pending-list"></div>
    </div>
  </div>

  <!-- ── 管理员登录 ── -->
  <div class="screen hidden" id="screen-admin-login">
    <div class="page-header">
      <button class="btn-back" onclick="goTo('landing')">返回</button>
      <h2>管理员登录</h2>
    </div>
    <div class="login-wrap">
      <div class="form-group">
        <label>账号</label>
        <input id="admin-username" type="text" placeholder="账号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input id="admin-password" type="password" placeholder="密码"
          onkeydown="if(event.key==='Enter') doAdminLogin()">
      </div>
      <p id="login-error" class="error-msg"></p>
      <button class="btn btn-primary btn-large" onclick="doAdminLogin()">登录</button>
    </div>
  </div>

  <!-- ── 管理员后台 ── -->
  <div class="screen hidden" id="screen-admin">
    <div class="admin-header">
      <h2>管理员后台</h2>
      <button class="btn btn-ghost btn-sm" onclick="doAdminLogout()">登出</button>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="ledger" onclick="loadAdminTab('ledger')">台账管理</button>
      <button class="tab-btn" data-tab="records" onclick="loadAdminTab('records')">查询记录</button>
      <button class="tab-btn" data-tab="logs" onclick="loadAdminTab('logs')">操作日志</button>
      <button class="tab-btn" data-tab="operators" onclick="loadAdminTab('operators')">查询员管理</button>
      <button class="tab-btn" data-tab="account" onclick="loadAdminTab('account')">账号设置</button>
    </div>

    <!-- 台账 -->
    <div class="tab-content" data-tab="ledger">
      <div class="ledger-stats">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">-</div>
          <div class="stat-label">全部</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-waishang">-</div>
          <div class="stat-label">外商组</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-qijin">-</div>
          <div class="stat-label">企金组</div>
        </div>
        <div class="stat-card" id="stat-expiring-card" onclick="toggleExpiringFilter()" style="cursor:pointer">
          <div class="stat-num" id="stat-expiring">-</div>
          <div class="stat-label">30天内到期 <span id="expiring-filter-dot" class="hidden">●</span></div>
        </div>
      </div>
      <div class="tab-toolbar">
        <input id="ledger-search" type="text" placeholder="搜索公司名称..." oninput="filterLedger()" style="max-width:160px">
        <select id="ledger-filter-sheet" onchange="filterLedger()" style="max-width:100px">
          <option value="">全部部门</option>
          <option value="外商组">外商组</option>
          <option value="企金组">企金组</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="exportLedger()">↓ 匯出</button>
        <button class="btn btn-primary" onclick="showCompanyForm()">+ 新增</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>部门</th><th>组别</th><th>公司名称</th>
              <th id="th-authdate" class="th-sortable" onclick="toggleSortAuthDate()">授权起始日 <span id="sort-icon">⇅</span></th><th>备注</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="ledger-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 查询记录 -->
    <div class="tab-content hidden" data-tab="records">
      <div class="tab-toolbar">
        <input id="rec-search" type="text" placeholder="搜索申请人/查询员/公司..." oninput="filterRecords()" style="max-width:180px">
        <select id="rec-filter-purpose" onchange="filterRecords()" style="max-width:90px">
          <option value="">全部目的</option>
          <option value="贷前">贷前</option>
          <option value="贷中">贷中</option>
          <option value="贷后">贷后</option>
          <option value="担保">担保</option>
        </select>
        <select id="rec-filter-status" onchange="filterRecords()" style="max-width:90px">
          <option value="">全部状态</option>
          <option value="pending">待处理</option>
          <option value="completed">已完成</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="exportRecords()">↓ 匯出</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>申请时间</th><th>申请人</th><th>查询员</th>
              <th>公司名称</th><th>查询目的</th><th>状态</th>
            </tr>
          </thead>
          <tbody id="records-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 操作日志 -->
    <div class="tab-content hidden" data-tab="logs">
      <div class="tab-toolbar">
        <input id="log-search" type="text" placeholder="搜索操作人/动作/详情..." oninput="filterLogs()" style="max-width:200px">
        <select id="log-filter-action" onchange="filterLogs()" style="max-width:120px">
          <option value="">全部动作</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="exportLogs()">↓ 匯出</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>时间</th><th>操作人</th><th>动作</th><th>详情</th></tr>
          </thead>
          <tbody id="logs-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 查询员管理 -->
    <div class="tab-content hidden" data-tab="operators">
      <div class="add-row">
        <input id="new-op-name" type="text" placeholder="查询员姓名"
          onkeydown="if(event.key==='Enter') addOperator()">
        <button class="btn btn-primary" onclick="addOperator()">新增查询员</button>
      </div>
      <div id="operators-list"></div>
    </div>

    <!-- 账号设置 -->
    <div class="tab-content hidden" data-tab="account">
      <div class="form-wrap" style="padding-top:0">
        <div class="form-section">
          <div class="form-group">
            <label>新账号</label>
            <input id="new-username" type="text" placeholder="不修改则留空">
          </div>
          <div class="form-group">
            <label>新密码</label>
            <input id="new-pw" type="password" placeholder="新密码">
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <input id="new-pw2" type="password" placeholder="再输入一次">
          </div>
          <div style="padding:14px 16px">
            <button class="btn btn-primary" onclick="doChangePassword()">保存修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 提交成功 ── -->
  <div class="screen hidden" id="screen-success">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <h2>申请已提交</h2>
      <p>查询员将尽快处理您的申请</p>
      <button class="btn btn-primary" style="margin-top:28px;min-width:160px" onclick="goTo('landing')">返回首页</button>
    </div>
  </div>

</div>

<!-- ── 新增/编辑公司 Modal ── -->
<div id="company-modal" class="modal hidden" onclick="if(event.target===this)closeCompanyForm()">
  <div class="modal-content">
    <h3 id="modal-title">新增公司</h3>
    <div id="modal-add-warning" class="modal-warning hidden">
      ⚠️ 台帳是查詢授權的核心依據。請確認資料來源正確，避免誤差導致查詢授權問題。
    </div>
    <div class="form-group">
      <label>公司名称 *</label>
      <input id="cf-name" type="text" placeholder="公司名称">
    </div>
    <div class="form-group">
      <label>授权起始日 *</label>
      <input id="cf-date" type="text" placeholder="例如 2025.7.15">
    </div>
    <div class="form-group">
      <label>部门</label>
      <select id="cf-sheet">
        <option value="">-- 选择部门 --</option>
        <option value="外商组">外商组</option>
        <option value="企金组">企金组</option>
      </select>
    </div>
    <div class="form-group">
      <label>备注</label>
      <input id="cf-notes" type="text" placeholder="备注（选填）">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCompanyForm()">取消</button>
      <button class="btn btn-primary" onclick="saveCompany()">保存</button>
    </div>
  </div>
</div>

<script src="app.js?v=8"></script>
</body>
</html>
